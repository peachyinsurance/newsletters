name: Restaurant Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1'  # Every Monday at 10am UTC

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic google-auth google-auth-httplib2 google-api-python-client requests

      - name: Run restaurant pipeline
        env:
          CLAUDE_API_KEY:          ${{ secrets.CLAUDE_API_KEY }}
          GOOGLE_PLACES_API_KEY:   ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS }}
          GSHEET_ID:               ${{ secrets.GSHEET_ID }}
        run: python Restaurants/Code/Restaurant_Section.py
