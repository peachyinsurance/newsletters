name: Restaurant Pipeline

on:
  workflow_dispatch:
    inputs:
      newsletter:
        description: 'Which newsletter to generate for. "all" = every newsletter. (East_Cobb_Connect / Perimeter_Post / Lewisville_Lake_Lookout / all)'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'East_Cobb_Connect'
          - 'Perimeter_Post'
          - 'Lewisville_Lake_Lookout'
      chain:
        description: 'Continue chain (Featured Event → Free Events → ...) after this finishes'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  actions: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic google-auth google-auth-httplib2 google-api-python-client requests
      
      - name: Install dependencies
        run: pip install anthropic requests notion-client Pillow

      - name: Run restaurant pipeline
        env:
          CLAUDE_API_KEY:           ${{ secrets.CLAUDE_API_KEY }}
          GOOGLE_PLACES_API_KEY:    ${{ secrets.GOOGLE_PLACES_API_KEY }}
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:        ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          NEWSLETTER:               ${{ github.event.inputs.newsletter || 'all' }}
        run: python Restaurants/Code/Restaurant_Section.py

      - name: Publish GIFs to gh-pages
        # Publish even on partial failure — earlier newsletters in the run
        # may have saved Notion rows referencing GIF URLs that exist only
        # on the runner's local disk.
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ls Restaurants/Code/output/*.gif 1>/dev/null 2>&1 || ls Restaurants/Code/output/*.webp 1>/dev/null 2>&1; then
            cp -r Restaurants/Code/output /tmp/restaurant_gifs
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git stash --include-untracked || true
            git fetch origin gh-pages
            git checkout gh-pages
            mkdir -p gifs
            rm -f gifs/rest_*.gif gifs/rest_*.webp 2>/dev/null || true
            cp /tmp/restaurant_gifs/*.gif gifs/ 2>/dev/null || true
            cp /tmp/restaurant_gifs/*.webp gifs/ 2>/dev/null || true
            git add gifs/
            git commit -m "update restaurant GIFs" || true
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/peachyinsurance/newsletters.git
            git push origin gh-pages
            git checkout main
            git stash pop || true
            echo "✓ Restaurant GIFs published"
          else
            echo "No GIFs to publish"
          fi

      - name: Trigger deploy to refresh review app
        if: ${{ (github.event.inputs.chain || 'true') == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/deploy_review_app.yml/dispatches \
            -d '{"ref":"main"}'
          echo "✓ Deploy triggered"

      - name: Trigger next in chain (Featured Event)
        if: ${{ always() && (github.event.inputs.chain || 'true') == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/featured_event.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"newsletter\":\"${{ github.event.inputs.newsletter || 'all' }}\",\"chain\":\"true\"}}"
          echo "→ Triggered Featured Event"
