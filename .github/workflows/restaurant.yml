name: Restaurant Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1'  # Every Monday at 10am UTC

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic google-auth google-auth-httplib2 google-api-python-client requests
      
      - name: Install dependencies
        run: pip install anthropic requests notion-client
      
      - name: Run restaurant pipeline
        env:
          CLAUDE_API_KEY:           ${{ secrets.CLAUDE_API_KEY }}
          GOOGLE_PLACES_API_KEY:    ${{ secrets.GOOGLE_PLACES_API_KEY }}
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:        ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
        run: python Restaurants/code/Restaurant_Section.py

      - name: Trigger deploy to refresh review app
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/couch2coders/NewsletterAutomation/actions/workflows/deploy_review_app.yml/dispatches \
            -d '{"ref":"main"}'
          echo "✓ Deploy triggered"
