name: Generate Free Events

on:
  workflow_dispatch:
    inputs:
      newsletter:
        description: 'Which newsletter to generate for. "all" = every newsletter. (East_Cobb_Connect / Perimeter_Post / Lewisville_Lake_Lookout / all)'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'East_Cobb_Connect'
          - 'Perimeter_Post'
          - 'Lewisville_Lake_Lookout'
      chain:
        description: 'Continue chain (Local Lowdown → Real Estate → ...) after this finishes'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      data_source:
        description: 'Where to pull events from. "notion" = use whatever the last scrape saved (fast). "scrape" = re-run web scrapers first to refresh the Notion DB.'
        required: false
        default: 'notion'
        type: choice
        options:
          - 'notion'
          - 'scrape'
      issue_date:
        description: 'Issue date (MM/DD/YYYY). Empty = upcoming Thursday. Targets that Thursday through next Wednesday.'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests anthropic beautifulsoup4 curl_cffi

      # ── Optional pre-scrape (data_source == 'scrape') ───────────────────
      - name: Refresh travelcobb.org
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  East_Cobb_Connect
        run: python "Weekend Events/Code/East_Cobb_Connect/travel_cobb.py"

      - name: Refresh visitmariettaga.com
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  East_Cobb_Connect
        run: python "Weekend Events/Code/East_Cobb_Connect/visit_marietta.py"

      - name: Refresh kennesaw-ga.gov
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  East_Cobb_Connect
        run: python "Weekend Events/Code/East_Cobb_Connect/kennesaw.py"

      - name: Refresh Sandy Springs (ECC_PP shared pool)
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  ECC_PP
        run: python "Weekend Events/Code/Perimeter_Post/sandy_springs.py"

      - name: Refresh Eventbrite (via Apify)
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          APIFY_API_KEY:               ${{ secrets.APIFY_API_KEY }}
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  East_Cobb_Connect
        run: python "Weekend Events/Code/East_Cobb_Connect/eventbrite.py"

      - name: Refresh cobbcounty.gov
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  East_Cobb_Connect
        run: python "Weekend Events/Code/East_Cobb_Connect/cobb_county.py"

      - name: Generate Free Events
        env:
          CLAUDE_API_KEY:               ${{ secrets.CLAUDE_API_KEY }}
          BRAVE_NEWS_API_KEY:           ${{ secrets.BRAVE_NEWS_API_KEY }}
          GOOGLE_PLACES_API_KEY:        ${{ secrets.GOOGLE_PLACES_API_KEY }}
          NOTION_API_KEY:               ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:            ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID:     ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          NOTION_FREE_EVENTS_DB_ID:     ${{ secrets.NOTION_FREE_EVENTS_DB_ID }}
          NOTION_WEEKEND_EVENTS_DB_ID:  ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                   ${{ github.event.inputs.newsletter || 'all' }}
          ISSUE_DATE:                   ${{ github.event.inputs.issue_date || '' }}
        run: python "Free Events/Code/Free_Events.py"

      - name: Trigger newsletter page rebuild
        if: ${{ (github.event.inputs.chain || 'true') == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main","inputs":{"section":"free_events"}}'
          echo "✓ Newsletter page rebuild triggered"

      - name: Trigger next in chain (Local Lowdown)
        if: ${{ always() && (github.event.inputs.chain || 'true') == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/local_lowdown.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"newsletter\":\"${{ github.event.inputs.newsletter || 'all' }}\",\"chain\":\"true\",\"issue_date\":\"${{ github.event.inputs.issue_date || '' }}\"}}"
          echo "→ Triggered Local Lowdown"
