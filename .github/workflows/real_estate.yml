name: Generate Real Estate Corner

on:
  schedule:
    - cron: '0 13 * * 3'  # Every Wednesday at 8am EST (1pm UTC)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests anthropic Pillow
      - name: Generate Real Estate Corner
        env:
          CLAUDE_API_KEY:           ${{ secrets.CLAUDE_API_KEY }}
          REALTOR_API_KEY:          ${{ secrets.REALTOR_API_KEY }}
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:        ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          NOTION_RE_DB_ID:          ${{ secrets.NOTION_RE_DB_ID }}
        run: python "Real Estate Corner/Code/Real_Estate_Corner.py"

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: real-estate-images
          path: |
            Real Estate Corner/Code/output/*.gif
            Real Estate Corner/Code/output/*.png
            Real Estate Corner/Code/output/*.webp
          if-no-files-found: ignore

      - name: Publish images to gh-pages for public URLs
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if compgen -G "Real Estate Corner/Code/output/*" > /dev/null 2>&1; then
            cp -r "Real Estate Corner/Code/output" /tmp/re_images
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git stash --include-untracked || true
            git fetch origin gh-pages
            git checkout gh-pages
            mkdir -p gifs
            echo "Files in /tmp/re_images/:"
            ls -la /tmp/re_images/ 2>/dev/null || echo "  /tmp/re_images/ not found"
            rm -f gifs/re_*.gif gifs/re_*.png gifs/re_*.webp 2>/dev/null || true
            cp /tmp/re_images/*.gif gifs/ 2>/dev/null || true
            cp /tmp/re_images/*.png gifs/ 2>/dev/null || true
            cp /tmp/re_images/*.webp gifs/ 2>/dev/null || true
            echo "Files in gifs/ after copy:"
            ls -la gifs/re_* 2>/dev/null || echo "  No RE files in gifs/"
            git add gifs/
            git commit -m "update real estate images" || true
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/peachyinsurance/newsletters.git
            git push origin gh-pages
            git checkout main
            git stash pop || true
            echo "✓ Images published to gh-pages/gifs/"
          else
            echo "No images to publish"
          fi

      - name: Trigger newsletter page rebuild
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main","inputs":{"section":"real_estate"}}'
          echo "✓ Newsletter page rebuild triggered"
