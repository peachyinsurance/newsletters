name: Generate Real Estate Corner

on:
  schedule:
    - cron: '0 13 * * 3'  # Every Wednesday at 8am EST (1pm UTC)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests anthropic Pillow
      - name: Generate Real Estate Corner
        env:
          CLAUDE_API_KEY:           ${{ secrets.CLAUDE_API_KEY }}
          REALTOR_API_KEY:          ${{ secrets.REALTOR_API_KEY }}
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:        ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          NOTION_RE_DB_ID:          ${{ secrets.NOTION_RE_DB_ID }}
        run: python "Real Estate Corner/Code/Real_Estate_Corner.py"

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: real-estate-images
          path: |
            Real Estate Corner/Code/output/*.gif
            Real Estate Corner/Code/output/*.png
          if-no-files-found: ignore

      - name: Publish images to gh-pages for public URLs
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if ls "Real Estate Corner/Code/output/"*.gif "Real Estate Corner/Code/output/"*.png 1>/dev/null 2>&1; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git fetch origin gh-pages
            git checkout gh-pages
            mkdir -p gifs
            cp "Real Estate Corner/Code/output/"*.gif gifs/ 2>/dev/null || true
            cp "Real Estate Corner/Code/output/"*.png gifs/ 2>/dev/null || true
            git add gifs/
            git commit -m "update real estate images" || true
            git push origin gh-pages
            git checkout main
            echo "✓ GIFs published to gh-pages/gifs/"
          else
            echo "No GIFs to publish"
          fi

      - name: Trigger newsletter page rebuild
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/couch2coders/NewsletterAutomation/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main"}'
          echo "✓ Newsletter page rebuild triggered"
