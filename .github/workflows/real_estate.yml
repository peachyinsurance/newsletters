name: Generate Real Estate Corner

on:
  workflow_dispatch:
    inputs:
      newsletter:
        description: 'Which newsletter to generate for. "all" = every newsletter. (East_Cobb_Connect / Perimeter_Post / Lewisville_Lake_Lookout / all)'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'East_Cobb_Connect'
          - 'Perimeter_Post'
          - 'Lewisville_Lake_Lookout'
      chain:
        description: 'Continue chain (Weekend Planner → Business Brief → ...) after this finishes'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      issue_date:
        description: 'Issue date (MM/DD/YYYY). Empty = scheduled cadence. Forwarded to Weekend Planner downstream.'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests anthropic Pillow
      - name: Generate Real Estate Corner
        env:
          CLAUDE_API_KEY:           ${{ secrets.CLAUDE_API_KEY }}
          REALTOR_API_KEY:          ${{ secrets.REALTOR_API_KEY }}
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:        ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          NOTION_RE_DB_ID:          ${{ secrets.NOTION_RE_DB_ID }}
          NEWSLETTER:               ${{ github.event.inputs.newsletter || 'all' }}
        run: python "Real Estate Corner/Code/Real_Estate_Corner.py"

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: real-estate-images
          path: |
            Real Estate Corner/Code/output/*.gif
            Real Estate Corner/Code/output/*.png
            Real Estate Corner/Code/output/*.webp
          if-no-files-found: ignore

      - name: Publish images to gh-pages for public URLs
        # Publish even on partial failure — earlier newsletters in the run
        # may have saved Notion rows referencing image URLs that exist
        # only on the runner's local disk.
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if compgen -G "Real Estate Corner/Code/output/*" > /dev/null 2>&1; then
            cp -r "Real Estate Corner/Code/output" /tmp/re_images
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git stash --include-untracked || true
            git fetch origin gh-pages
            git checkout gh-pages
            mkdir -p gifs
            echo "Files in /tmp/re_images/:"
            ls -la /tmp/re_images/ 2>/dev/null || echo "  /tmp/re_images/ not found"
            # Remove only the stale RE images for the newsletter(s) in THIS
            # run, so other newsletters' already-published images aren't wiped.
            # (A blanket `rm -f gifs/re_*` used to delete every newsletter's RE
            # images each run, leaving only the most-recent newsletter's URLs
            # live and 404-ing the rest in Notion.)
            for f in /tmp/re_images/re_*; do
              [ -e "$f" ] || continue
              prefix=$(basename "$f" | sed -E 's/_(starter|sweet_spot|showcase)_template_[0-9]+\.(gif|png|webp)$//')
              rm -f gifs/"$prefix"_* 2>/dev/null || true
            done
            cp /tmp/re_images/*.gif gifs/ 2>/dev/null || true
            cp /tmp/re_images/*.png gifs/ 2>/dev/null || true
            cp /tmp/re_images/*.webp gifs/ 2>/dev/null || true
            echo "Files in gifs/ after copy:"
            ls -la gifs/re_* 2>/dev/null || echo "  No RE files in gifs/"
            git add gifs/
            git commit -m "update real estate images" || true
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/peachyinsurance/newsletters.git
            git push origin gh-pages
            git checkout main
            git stash pop || true
            echo "✓ Images published to gh-pages/gifs/"
          else
            echo "No images to publish"
          fi

      - name: Trigger newsletter page rebuild
        if: ${{ (github.event.inputs.chain || 'true') == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main","inputs":{"section":"real_estate"}}'
          echo "✓ Newsletter page rebuild triggered"

      - name: Trigger next in chain (Weekend Planner)
        if: ${{ always() && (github.event.inputs.chain || 'true') == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/weekend_planner.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"newsletter\":\"${{ github.event.inputs.newsletter || 'all' }}\",\"chain\":\"true\",\"issue_date\":\"${{ github.event.inputs.issue_date || '' }}\"}}"
          echo "→ Triggered Weekend Planner"
