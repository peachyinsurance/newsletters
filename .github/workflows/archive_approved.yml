name: Archive Approved Items

on:
  # schedule:  # ── PAUSED for the week. Uncomment to resume auto-runs. ──
  #   - cron: '0 22 * * 5'  # Every Friday at 5pm EST (10pm UTC)
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Archive approved items to old
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:           ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID:    ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          NOTION_EVENTS_DB_ID:         ${{ secrets.NOTION_EVENTS_DB_ID }}
          NOTION_LOWDOWN_DB_ID:        ${{ secrets.NOTION_LOWDOWN_DB_ID }}
          NOTION_RE_DB_ID:             ${{ secrets.NOTION_RE_DB_ID }}
          NOTION_INTRO_DB_ID:          ${{ secrets.NOTION_INTRO_DB_ID }}
          NOTION_FREE_EVENTS_DB_ID:    ${{ secrets.NOTION_FREE_EVENTS_DB_ID }}
          NOTION_BUSINESS_BRIEF_DB_ID: ${{ secrets.NOTION_BUSINESS_BRIEF_DB_ID }}
          NOTION_TIPS_DB_ID:           ${{ secrets.NOTION_TIPS_DB_ID }}
          NOTION_PARENT_PAGE_ID:       ${{ secrets.NOTION_PARENT_PAGE_ID }}
        run: python NewsletterCreation/Code/archive_approved.py
