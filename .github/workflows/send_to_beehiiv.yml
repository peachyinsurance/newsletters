name: Send to Beehiiv

on:
  workflow_dispatch:
    inputs:
      newsletter:
        description: 'Which newsletter to send (currently only East_Cobb_Connect supported)'
        required: false
        default: 'East_Cobb_Connect'
        type: choice
        options:
          - East_Cobb_Connect
      status:
        description: 'Beehiiv post status'
        required: false
        default: 'draft'
        type: choice
        options:
          - draft
          - confirmed
          - scheduled

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests anthropic

      - name: Send issue to Beehiiv
        env:
          # Notion (read all section data — same DBs as the assembler)
          NOTION_API_KEY:                ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:             ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID:      ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          NOTION_LOWDOWN_DB_ID:          ${{ secrets.NOTION_LOWDOWN_DB_ID }}
          NOTION_RE_DB_ID:               ${{ secrets.NOTION_RE_DB_ID }}
          NOTION_INTRO_DB_ID:            ${{ secrets.NOTION_INTRO_DB_ID }}
          NOTION_EVENTS_DB_ID:           ${{ secrets.NOTION_EVENTS_DB_ID }}
          NOTION_FREE_EVENTS_DB_ID:      ${{ secrets.NOTION_FREE_EVENTS_DB_ID }}
          NOTION_POLLS_DB_ID:            ${{ secrets.NOTION_POLLS_DB_ID }}
          NOTION_PARENT_PAGE_ID:         ${{ secrets.NOTION_PARENT_PAGE_ID }}
          # Claude (subject line)
          CLAUDE_API_KEY:                ${{ secrets.CLAUDE_API_KEY }}
          # Beehiiv
          BEEHIIV_API_KEY:               ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_ECC_PUBLICATION_ID:    ${{ secrets.BEEHIIV_ECC_PUBLICATION_ID }}
          BEEHIIV_ECC_TEMPLATE_POST_ID:  ${{ secrets.BEEHIIV_ECC_TEMPLATE_POST_ID }}
          # Run params
          NEWSLETTER:                    ${{ github.event.inputs.newsletter || 'East_Cobb_Connect' }}
          STATUS:                        ${{ github.event.inputs.status || 'draft' }}
        run: python "Beehiiv/Code/Send_To_Beehiiv.py"
