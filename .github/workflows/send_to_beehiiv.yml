name: Send to Beehiiv

on:
  workflow_dispatch:
    inputs:
      newsletter:
        description: 'Which newsletter to send (currently only East_Cobb_Connect supported)'
        required: false
        default: 'East_Cobb_Connect'
        type: choice
        options:
          - East_Cobb_Connect
      status:
        description: 'Beehiiv post status'
        required: false
        default: 'draft'
        type: choice
        options:
          - draft
          - confirmed
          - scheduled

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests anthropic beautifulsoup4 Pillow

      - name: Build newsletter header image
        env:
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:        ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          NOTION_LOWDOWN_DB_ID:     ${{ secrets.NOTION_LOWDOWN_DB_ID }}
          NOTION_RE_DB_ID:          ${{ secrets.NOTION_RE_DB_ID }}
          NOTION_INTRO_DB_ID:       ${{ secrets.NOTION_INTRO_DB_ID }}
          NOTION_EVENTS_DB_ID:      ${{ secrets.NOTION_EVENTS_DB_ID }}
          NOTION_FREE_EVENTS_DB_ID: ${{ secrets.NOTION_FREE_EVENTS_DB_ID }}
          NOTION_POLLS_DB_ID:       ${{ secrets.NOTION_POLLS_DB_ID }}
          NOTION_PARENT_PAGE_ID:    ${{ secrets.NOTION_PARENT_PAGE_ID }}
          NEWSLETTER:               ${{ github.event.inputs.newsletter || 'East_Cobb_Connect' }}
        run: python "Beehiiv/Code/prepare_header_image.py"

      - name: Publish header image to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if compgen -G "Beehiiv/Code/output/Newsletter_Header_image_*.png" > /dev/null 2>&1; then
            mkdir -p /tmp/header_staging
            cp Beehiiv/Code/output/Newsletter_Header_image_*.png /tmp/header_staging/
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git stash --include-untracked || true
            git fetch origin gh-pages
            git checkout gh-pages
            mkdir -p gifs
            cp /tmp/header_staging/*.png gifs/
            git add gifs/Newsletter_Header_image_*.png
            git commit -m "update newsletter header image" || true
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/peachyinsurance/newsletters.git
            git push origin gh-pages
            git checkout main
            git stash pop || true
            echo "✓ Header image published to gh-pages/gifs/"
          else
            echo "  ⓘ No header image to publish (no featured event?)"
          fi

      - name: Send issue to Beehiiv
        env:
          # Notion (read all section data — same DBs as the assembler)
          NOTION_API_KEY:                ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:             ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID:      ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          NOTION_LOWDOWN_DB_ID:          ${{ secrets.NOTION_LOWDOWN_DB_ID }}
          NOTION_RE_DB_ID:               ${{ secrets.NOTION_RE_DB_ID }}
          NOTION_INTRO_DB_ID:            ${{ secrets.NOTION_INTRO_DB_ID }}
          NOTION_EVENTS_DB_ID:           ${{ secrets.NOTION_EVENTS_DB_ID }}
          NOTION_FREE_EVENTS_DB_ID:      ${{ secrets.NOTION_FREE_EVENTS_DB_ID }}
          NOTION_POLLS_DB_ID:            ${{ secrets.NOTION_POLLS_DB_ID }}
          NOTION_PARENT_PAGE_ID:         ${{ secrets.NOTION_PARENT_PAGE_ID }}
          # Claude (subject line)
          CLAUDE_API_KEY:                ${{ secrets.CLAUDE_API_KEY }}
          # Beehiiv
          BEEHIIV_API_KEY:               ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_ECC_PUBLICATION_ID:    ${{ secrets.BEEHIIV_ECC_PUBLICATION_ID }}
          BEEHIIV_ECC_TEMPLATE_POST_ID:  ${{ secrets.BEEHIIV_ECC_TEMPLATE_POST_ID }}
          # Run params
          NEWSLETTER:                    ${{ github.event.inputs.newsletter || 'East_Cobb_Connect' }}
          STATUS:                        ${{ github.event.inputs.status || 'draft' }}
        run: python "Beehiiv/Code/Send_To_Beehiiv.py"

      # When the newsletter is actually being sent (not a draft), kick off
      # a poll-counts refresh immediately so the landing page reflects votes
      # from the moment subscribers start clicking — no waiting for the next
      # 30-min cron tick. Drafts skip this since there's nothing to poll yet.
      - name: Trigger initial poll counts update
        if: ${{ github.event.inputs.status != 'draft' }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/update_poll_counts.yml/dispatches \
            -d '{"ref":"main"}'
          echo "✓ Poll counts update triggered (post-send)"
