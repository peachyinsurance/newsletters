name: Festive Restaurant Swap

on:
  workflow_dispatch:
  # Optional weekly schedule — uncomment if you want it to fire automatically
  # schedule:
  #   - cron: '0 14 * * 6'  # Saturdays at 9am EST (14:00 UTC)

jobs:
  swap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests anthropic

      - name: Run festive swap
        env:
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
        run: python "Restaurants/Code/festive_swap.py"

      - name: Trigger deploy to refresh review app
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/deploy_review_app.yml/dispatches \
            -d '{"ref":"main"}'
          echo "✓ Deploy triggered"

      - name: Trigger newsletter page restaurant rebuild
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main","inputs":{"section":"restaurants"}}'
          echo "✓ Restaurant section rebuild triggered"
