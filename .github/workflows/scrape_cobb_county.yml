name: Scrape Cobb County (only)

# Standalone, single-source scrape of cobbcounty.gov events into the Weekend
# Events Notion DB. Use this to refresh ONLY the Cobb County rows — including
# the detail-page address backfill (the listing API returns null addresses, so
# the real venue street address is scraped from each event's detail page) —
# without re-running the full weekend-events scrape or the downstream chain.
#
# Tagged East_Cobb_Connect.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape_cobb_county:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests

      - name: Scrape cobbcounty.gov
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  East_Cobb_Connect
        run: python "Weekend Events/Code/East_Cobb_Connect/cobb_county.py"
