name: Rebuild Newsletter (full chain)

# One-click "rebuild everything for this newsletter" — kicks off the full
# Mon-chain (Weekend Events scrape → Pets → Restaurants → Featured Event
# → Free Events → Local Lowdown → Real Estate → Weekend Planner →
# Business Brief → Insurance Tip → Reader Poll) for a single newsletter.
#
# The chain end (Reader Poll) auto-triggers the full Notion landing-page
# rebuild + review-app deploy, so the resulting site is fully repopulated.
#
# Use this after wiping Notion DBs, switching publication IDs, or any time
# you want to start over for one newsletter without affecting the others.

on:
  workflow_dispatch:
    inputs:
      newsletter:
        description: 'Which newsletter to rebuild (use "all" for everything)'
        required: false
        default: 'East_Cobb_Connect'
        type: choice
        options:
          - 'all'
          - 'East_Cobb_Connect'
          - 'Perimeter_Post'
          - 'Lewisville_Lake_Lookout'

permissions:
  contents: write
  actions: write

jobs:
  kickoff:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Weekend Events scrape (chain starter)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NL: ${{ github.event.inputs.newsletter }}
        run: |
          echo "Kicking off full chain rebuild for: $NL"
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/weekend_events.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"newsletter\":\"$NL\",\"mode\":\"both\",\"chain\":\"true\"}}"
          echo "✓ Triggered. Watch progress in the Actions tab —"
          echo "   chain runs ~30–35 minutes through scrape + 10 sections,"
          echo "   then auto-fires the Notion rebuild + review-app deploy."
