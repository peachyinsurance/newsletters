name: Sync Workflow Dropdowns

# Auto-syncs every workflow's `newsletter:` dropdown options with the
# canonical NEWSLETTERS_DICT in newsletters_config.py. Fires when that file
# changes on main — so adding/removing a newsletter only requires editing
# the single Python dict; this job picks it up and rewrites every workflow.

on:
  push:
    branches: [main]
    paths:
      - 'NewsletterCreation/Code/newsletters_config.py'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync dropdowns
        run: python NewsletterCreation/Code/sync_workflow_dropdowns.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          if [[ -n "$(git status --porcelain .github/workflows/)" ]]; then
            git add .github/workflows/*.yml
            git commit -m "sync workflow dropdowns to newsletters_config"
            git push origin main
            echo "✓ Pushed dropdown sync to main"
          else
            echo "✓ Already in sync — nothing to commit"
          fi
