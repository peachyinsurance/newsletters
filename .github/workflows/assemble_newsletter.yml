name: Assemble Newsletter Pages

on:
  workflow_dispatch:
    inputs:
      section:
        description: 'Which section to update. "all" = full rebuild. Section keys: intro, summary, poll, sponsor, featured_event, restaurants, business_brief, real_estate, lowdown, pets, weekend_planner, free_events, tip, in_search_of, meme'
        required: false
        default: 'all'
      newsletter:
        description: 'Which newsletter to update. "all" = every newsletter. Newsletter names: East_Cobb_Connect, Perimeter_Post, Lewisville_Lake_Lookout'
        required: false
        default: 'all'
      weekend_audience:
        description: 'Weekend Planner only: which audience pane. (Family / Adult / both)'
        required: false
        default: 'both'
      weekend_day:
        description: 'Weekend Planner only: which day(s). (Friday / Saturday / Sunday / all)'
        required: false
        default: 'all'
      append:
        description: 'Append to the section instead of overwriting. Useful for adding Weekend Planner events incrementally. (true/false)'
        required: false
        default: 'false'

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Assemble newsletter landing pages in Notion
        env:
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:        ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          NOTION_LOWDOWN_DB_ID:     ${{ secrets.NOTION_LOWDOWN_DB_ID }}
          NOTION_RE_DB_ID:          ${{ secrets.NOTION_RE_DB_ID }}
          NOTION_INTRO_DB_ID:       ${{ secrets.NOTION_INTRO_DB_ID }}
          NOTION_EVENTS_DB_ID:      ${{ secrets.NOTION_EVENTS_DB_ID }}
          NOTION_FREE_EVENTS_DB_ID: ${{ secrets.NOTION_FREE_EVENTS_DB_ID }}
          NOTION_POLLS_DB_ID:       ${{ secrets.NOTION_POLLS_DB_ID }}
          NOTION_WEEKEND_PLANNER_DB_ID: ${{ secrets.NOTION_WEEKEND_PLANNER_DB_ID }}
          NOTION_BUSINESS_BRIEF_DB_ID: ${{ secrets.NOTION_BUSINESS_BRIEF_DB_ID }}
          NOTION_TIPS_DB_ID:        ${{ secrets.NOTION_TIPS_DB_ID }}
          NOTION_PARENT_PAGE_ID:    ${{ secrets.NOTION_PARENT_PAGE_ID }}
          SECTION:                  ${{ github.event.inputs.section || 'all' }}
          NEWSLETTER:               ${{ github.event.inputs.newsletter || 'all' }}
          WEEKEND_AUDIENCE:         ${{ github.event.inputs.weekend_audience || 'both' }}
          WEEKEND_DAY:              ${{ github.event.inputs.weekend_day || 'all' }}
          APPEND:                   ${{ github.event.inputs.append || 'false' }}
        run: python NewsletterCreation/Code/assemble_newsletter_page.py
