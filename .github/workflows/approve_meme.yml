name: Approve Meme

on:
  workflow_dispatch:
    inputs:
      permalink:
        description: 'Reddit permalink of the meme to approve (Mode 1)'
        required: false
        default: ''
      newsletter:
        description: 'Newsletter the meme belongs to'
        required: false
        default: ''
      reject_remaining:
        description: 'If "true", flip all pending memes for this newsletter to rejected. Use after approving your 4 picks.'
        required: false
        default: 'false'
      approved_permalinks:
        description: 'Comma-separated permalinks to KEEP when rejecting remaining (extra safety)'
        required: false
        default: ''

permissions:
  contents: write
  actions: write

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Approve / Reject memes in Notion
        env:
          NOTION_API_KEY:        ${{ secrets.NOTION_API_KEY }}
          NOTION_MEMES_DB_ID:    ${{ secrets.NOTION_MEMES_DB_ID }}
          APPROVED_PERMALINK:    ${{ github.event.inputs.permalink }}
          NEWSLETTER:            ${{ github.event.inputs.newsletter }}
          REJECT_REMAINING:      ${{ github.event.inputs.reject_remaining }}
          APPROVED_PERMALINKS:   ${{ github.event.inputs.approved_permalinks }}
        run: python "Meme Corner/Code/approve_meme.py"

      - name: Trigger newsletter page rebuild
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main","inputs":{"section":"meme"}}'
          echo "✓ Newsletter page rebuild triggered"

      - name: Trigger review-app data refresh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/deploy_review_app.yml/dispatches \
            -d '{"ref":"main"}'
          echo "✓ Review app refresh triggered"
