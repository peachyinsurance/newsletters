name: Export Notion Data

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Newsletter Pipeline", "Restaurant Pipeline"]
    types: [completed]

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Export Notion data to JSON
        env:
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:        ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
        run: |
          cd Code
          python export_notion_data.py
          cp pets.json ../review-app/public/pets.json
          cp restaurants.json ../review-app/public/restaurants.json

      - name: Commit and push JSON files
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${PAT_TOKEN}@github.com/couch2coders/NewsletterAutomation.git
          cp Code/pets.json review-app/public/pets.json
          cp Code/restaurants.json review-app/public/restaurants.json
          git add -f review-app/public/pets.json review-app/public/restaurants.json
          git commit -m "Update pets and restaurants JSON data [$(date +%s)]" || echo "Nothing to commit"
          git push
