name: Scrape Weekend Events

# ── CHAIN ENTRY POINT ──────────────────────────────────────────────
# This is the canonical start of the full newsletter chain. It scrapes
# every source ONCE into the shared Notion Weekend Events DB, then
# dispatches the downstream sections WITHOUT data_source — so they read
# from Notion and do NOT re-scrape. Launch the chain here. Only run a
# section workflow (Featured Event / Free Events / Weekend Planner) with
# data_source=scrape for an isolated standalone refresh — doing so while
# the entry scraper already ran that day is redundant double work.
#
# Free scrapers only — every step in this workflow is a direct HTTP
# fetch with no per-event cost. We previously had a paid Apify
# Eventbrite layer; it was removed because the spend / yield ratio
# wasn't worth it. If you ever want to re-add a paid source, give it
# its own workflow file so the cost is visible from the workflow name.

on:
  # schedule:  # ── PAUSED for the week. Uncomment to resume auto-runs. ──
  #   # Mondays at 7am ET (11am UTC) — well ahead of Friday's newsletter
  #   - cron: '0 11 * * 1'
  #   # Fridays at 1pm UTC (~9am ET) — archive past events before send
  #   - cron: '0 13 * * 5'
  workflow_dispatch:
    inputs:
      newsletter:
        description: 'Newsletter downstream chain target (and archive scope).
          All scrapers always populate the DB regardless of this choice —
          this only decides which newsletter''s downstream chain (Pets →
          Restaurants → … → Featured Event) gets triggered, and which
          newsletter''s past-events archive runs in cleanup mode.'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'East_Cobb_Connect'
          - 'Perimeter_Post'
          - 'Lewisville_Lake_Lookout'
      mode:
        description: 'scrape | cleanup | both'
        required: false
        default: 'both'
        type: choice
        options:
          - 'both'
          - 'scrape'
          - 'cleanup'
      chain:
        description: 'After scraping, trigger Pets → Restaurants → Featured Event → … chain'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      issue_date:
        description: 'Issue date (MM/DD/YYYY). Empty = current week. Forwarded through the chain so all event sections target the same issue.'
        required: false
        default: ''
        type: string
      runner:
        description: 'Where to run. auto = the machine of whoever clicked Run if online (runner labeled user-<github-login>) — uses their residential IP so Cloudflare-walled sites (visit marietta, kennesaw, …) work. self-hosted / ubuntu-latest force that choice.'
        required: false
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'self-hosted'
          - 'ubuntu-latest'

permissions:
  contents: write
  actions: write

jobs:
  # Pick the runner at runtime so a job never hangs waiting on an offline
  # machine. Preference order for 'auto' (and for chained/scheduled runs):
  #   1. the triggerer's own runner  (label user-<github-login>)  if ONLINE
  #   2. any ONLINE self-hosted runner (e.g. the always-on Mac Mini)
  #   3. ubuntu-latest (GitHub cloud)
  # Several scrape sources (Tribe/Cloudflare) bot-wall datacenter IPs with HTTP
  # 202; a residential self-hosted runner clears them. A manual 'self-hosted' /
  # 'ubuntu-latest' choice forces that and skips detection. Online detection
  # reads the runners API, which GITHUB_TOKEN cannot — set a fine-grained PAT
  # (repo Administration: read) as secret RUNNER_PAT. Without it, 'auto' safely
  # degrades to ubuntu-latest (never hangs).
  pick-runner:
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.pick.outputs.label }}
    steps:
      - id: pick
        env:
          RUNNER_PAT:   ${{ secrets.RUNNER_PAT }}
          RUNNER_INPUT: ${{ github.event.inputs.runner }}
          ACTOR:        ${{ github.actor }}
        run: |
          set -euo pipefail
          OVERRIDE="${RUNNER_INPUT:-}"
          if [ "$OVERRIDE" = "self-hosted" ] || [ "$OVERRIDE" = "ubuntu-latest" ]; then
            echo "Forced runner: $OVERRIDE"
            echo "label=$OVERRIDE" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [ -z "${RUNNER_PAT:-}" ]; then
            echo "No RUNNER_PAT secret — can't check which runners are online; using ubuntu-latest."
            echo "label=ubuntu-latest" >> "$GITHUB_OUTPUT"; exit 0
          fi
          runners=$(curl -s -H "Authorization: Bearer $RUNNER_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/runners?per_page=100" || echo '{}')
          want="user-$ACTOR"
          if echo "$runners" | jq -e --arg w "$want" \
              '.runners[]? | select(.status=="online") | .labels[]?.name | ascii_downcase | select(. == ($w|ascii_downcase))' >/dev/null 2>&1; then
            echo "Triggerer's runner is online: $want"
            echo "label=$want" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if echo "$runners" | jq -e \
              '.runners[]? | select(.status=="online") | .labels[]?.name | select(. == "self-hosted")' >/dev/null 2>&1; then
            echo "Triggerer's machine offline — using a shared self-hosted runner."
            echo "label=self-hosted" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "No self-hosted runner online — falling back to ubuntu-latest."
          echo "label=ubuntu-latest" >> "$GITHUB_OUTPUT"

  weekend_events:
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.label }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        if: runner.environment == 'github-hosted'   # macOS self-hosted: use the Mac's own Python (setup-python's prebuilt mac Python hardcodes /Users/runner and stalls)
        with:
          python-version: '3.11'
      # curl_cffi: Chrome TLS impersonation for sites that fingerprint
      # plain Python requests (dunwoody_gov.py needs it; without it the
      # Vision Internet CMS returns 403). python3 -m pip works whether Python
      # came from setup-python (cloud) or the Mac's own install (self-hosted).
      - run: python3 -m pip install --quiet --upgrade requests curl_cffi pgeocode

      # Each scraper step runs only when the dropdown is "all" or its
      # newsletter. ECC owns Sandy Springs (shared ECC_PP) so the
      # Sandy Springs scrape rides with the ECC group; PP owns Roswell
      # so both Roswell scrapers ride with the PP group. The shared
      # rows still tag ECC_PP and show in both newsletters' pickers —
      # only the *scrape work* is split here.
      #
      # YAML helpers: `mode != cleanup` keeps the scraper off when only
      # archive is requested; `contains(fromJson(...))` matches the
      # dropdown against the group's allow-list.

      # ── ECC group ──────────────────────────────────────────────────────
      - name: Scrape travelcobb.org (East Cobb Connect)
        continue-on-error: true
        if: ${{ (github.event.inputs.mode || 'both') != 'cleanup'
             && contains(fromJson('["all","East_Cobb_Connect"]'),
                         github.event.inputs.newsletter || 'all') }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  East_Cobb_Connect
        run: python "Weekend Events/Code/East_Cobb_Connect/travel_cobb.py"

      - name: Scrape visitmariettaga.com (East Cobb Connect)
        continue-on-error: true
        if: ${{ (github.event.inputs.mode || 'both') != 'cleanup'
             && contains(fromJson('["all","East_Cobb_Connect"]'),
                         github.event.inputs.newsletter || 'all') }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  East_Cobb_Connect
        run: python "Weekend Events/Code/East_Cobb_Connect/visit_marietta.py"

      - name: Scrape kennesaw-ga.gov (East Cobb Connect)
        continue-on-error: true
        if: ${{ (github.event.inputs.mode || 'both') != 'cleanup'
             && contains(fromJson('["all","East_Cobb_Connect"]'),
                         github.event.inputs.newsletter || 'all') }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  East_Cobb_Connect
        run: python "Weekend Events/Code/East_Cobb_Connect/kennesaw.py"

      - name: Scrape cobbcounty.gov (East Cobb Connect)
        continue-on-error: true
        if: ${{ (github.event.inputs.mode || 'both') != 'cleanup'
             && contains(fromJson('["all","East_Cobb_Connect"]'),
                         github.event.inputs.newsletter || 'all') }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  East_Cobb_Connect
        run: python "Weekend Events/Code/East_Cobb_Connect/cobb_county.py"

      - name: Scrape The Battery Atlanta (East Cobb Connect)
        continue-on-error: true
        if: ${{ (github.event.inputs.mode || 'both') != 'cleanup'
             && contains(fromJson('["all","East_Cobb_Connect"]'),
                         github.event.inputs.newsletter || 'all') }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  East_Cobb_Connect
        run: python "Weekend Events/Code/East_Cobb_Connect/battery_atlanta.py"

      - name: Scrape visitsandysprings.org (ECC_PP shared — runs with ECC)
        continue-on-error: true
        if: ${{ (github.event.inputs.mode || 'both') != 'cleanup'
             && contains(fromJson('["all","East_Cobb_Connect"]'),
                         github.event.inputs.newsletter || 'all') }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  ECC_PP
        run: python "Weekend Events/Code/Perimeter_Post/sandy_springs.py"

      - name: Scrape Springs Cinema & Taphouse (ECC_PP shared — runs with ECC)
        continue-on-error: true
        if: ${{ (github.event.inputs.mode || 'both') != 'cleanup'
             && contains(fromJson('["all","East_Cobb_Connect"]'),
                         github.event.inputs.newsletter || 'all') }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  ECC_PP
        run: python "Weekend Events/Code/Perimeter_Post/springs_cinema.py"

      # ── PP group ───────────────────────────────────────────────────────
      - name: Scrape discoverdunwoody.com (Perimeter Post)
        continue-on-error: true
        if: ${{ (github.event.inputs.mode || 'both') != 'cleanup'
             && contains(fromJson('["all","Perimeter_Post"]'),
                         github.event.inputs.newsletter || 'all') }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  Perimeter_Post
        run: python "Weekend Events/Code/Perimeter_Post/discover_dunwoody.py"

      - name: Scrape dunwoodyga.gov city calendar (Perimeter Post)
        continue-on-error: true
        if: ${{ (github.event.inputs.mode || 'both') != 'cleanup'
             && contains(fromJson('["all","Perimeter_Post"]'),
                         github.event.inputs.newsletter || 'all') }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  Perimeter_Post
        run: python "Weekend Events/Code/Perimeter_Post/dunwoody_gov.py"

      - name: Scrape patch.com/georgia/dunwoody calendar (Perimeter Post)
        continue-on-error: true
        if: ${{ (github.event.inputs.mode || 'both') != 'cleanup'
             && contains(fromJson('["all","Perimeter_Post"]'),
                         github.event.inputs.newsletter || 'all') }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  Perimeter_Post
        run: python "Weekend Events/Code/Perimeter_Post/patch_dunwoody.py"

      - name: Scrape visitroswellga.com (ECC_PP shared — runs with PP)
        continue-on-error: true
        if: ${{ (github.event.inputs.mode || 'both') != 'cleanup'
             && contains(fromJson('["all","Perimeter_Post"]'),
                         github.event.inputs.newsletter || 'all') }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  ECC_PP
        run: python "Weekend Events/Code/Perimeter_Post/visit_roswell.py"

      - name: Scrape roswell365.com (ECC_PP shared — runs with PP)
        continue-on-error: true
        if: ${{ (github.event.inputs.mode || 'both') != 'cleanup'
             && contains(fromJson('["all","Perimeter_Post"]'),
                         github.event.inputs.newsletter || 'all') }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  ECC_PP
        run: python "Weekend Events/Code/Perimeter_Post/roswell_365.py"

      - name: Scrape chattnaturecenter.org (ECC_PP shared — runs with PP)
        continue-on-error: true
        if: ${{ (github.event.inputs.mode || 'both') != 'cleanup'
             && contains(fromJson('["all","Perimeter_Post"]'),
                         github.event.inputs.newsletter || 'all') }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  ECC_PP
        run: python "Weekend Events/Code/Perimeter_Post/chatt_nature_center.py"

      # ── LLL group ──────────────────────────────────────────────────────
      - name: Scrape visitlewisville.com (Lewisville Lake Lookout)
        continue-on-error: true
        if: ${{ (github.event.inputs.mode || 'both') != 'cleanup'
             && contains(fromJson('["all","Lewisville_Lake_Lookout"]'),
                         github.event.inputs.newsletter || 'all') }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  Lewisville_Lake_Lookout
        run: python "Weekend Events/Code/Lewisville_Lake_Lookout/visit_lewisville.py"

      - name: Scrape cityoflewisville.com (Lewisville Lake Lookout)
        continue-on-error: true
        if: ${{ (github.event.inputs.mode || 'both') != 'cleanup'
             && contains(fromJson('["all","Lewisville_Lake_Lookout"]'),
                         github.event.inputs.newsletter || 'all') }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  Lewisville_Lake_Lookout
        run: python "Weekend Events/Code/Lewisville_Lake_Lookout/city_of_lewisville.py"

      - name: Scrape Denton County calendar (Lewisville Lake Lookout)
        continue-on-error: true
        if: ${{ (github.event.inputs.mode || 'both') != 'cleanup'
             && contains(fromJson('["all","Lewisville_Lake_Lookout"]'),
                         github.event.inputs.newsletter || 'all') }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  Lewisville_Lake_Lookout
        run: python "Weekend Events/Code/Lewisville_Lake_Lookout/denton_county.py"

      # ── Post-scrape sweep: distance-based newsletter tagging ───────────
      # After all scrapers run, re-tag every row by straight-line distance
      # from the event's ZIP centroid to each newsletter's anchor (≤10 mi):
      # 0 anchors → untagged_group (unused); 1 → that newsletter; 2 → ECC_PP.
      # Replaces the old hardcoded shared-city sweep (normalize_city_tags).
      - name: Geo-tag events by distance
        continue-on-error: true
        if: ${{ (github.event.inputs.mode || 'both') != 'cleanup' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
        run: python "Weekend Events/Code/utilities/geo_tagger.py"

      # Flag free vs paid (scraped price → Free checkbox, keyword scan for the
      # no-price tail) so downstream sections read a flag instead of guessing.
      - name: Tag free events
        continue-on-error: true
        if: ${{ (github.event.inputs.mode || 'both') != 'cleanup' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
        run: python "Weekend Events/Code/utilities/free_tagger.py"

      - name: Archive past events
        continue-on-error: true
        if: ${{ (github.event.inputs.mode || 'both') != 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  ${{ github.event.inputs.newsletter || 'all' }}
        run: python "Weekend Events/Code/utilities/cleanup_past_events.py"

      # ── Chain entry point ──────────────────────────────────────────────
      # This workflow is now the FIRST step of the Monday rebuild chain:
      #   Weekend Events scrape → Pets → Restaurants → Featured Event →
      #   Free Events → Local Lowdown → Real Estate → Weekend Planner →
      #   Business Brief → Insurance Tip → Reader Poll
      # The Featured/Weekend/Free pickers now read events from the Notion
      # DB this workflow populates, so order matters.
      #
      # Skipped when:
      #   - The Friday cleanup cron fires (mode='cleanup' only, no point
      #     re-running the chain Friday morning after the issue went out)
      #   - The user explicitly passes chain='false' on manual dispatch
      - name: Trigger next in chain (Pets)
        if: ${{ (github.event.inputs.chain || 'true') == 'true'
             && github.event.schedule != '0 13 * * 5' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/newsletter.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"newsletter\":\"${{ github.event.inputs.newsletter || 'all' }}\",\"chain\":\"true\",\"issue_date\":\"${{ github.event.inputs.issue_date || '' }}\"}}"
          echo "→ Triggered Pets (chain continues from here)"
