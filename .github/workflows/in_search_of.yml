name: Generate In Search Of

# Scrapes per-newsletter job sources, then runs Claude to rewrite each
# scraped snippet into a neighborly hiring blurb. Saves to the In Search
# Of Notion DB; the assembler renders approved (or pending fallback)
# rows in the published section, positioned right before Meme Corner.

on:
  workflow_dispatch:
    inputs:
      newsletter:
        description: 'Which newsletter to generate for. "all" = every newsletter. (East_Cobb_Connect / Perimeter_Post / Lewisville_Lake_Lookout / all)'
        required: false
        default: 'East_Cobb_Connect'
        type: choice
        options:
          - 'all'
          - 'East_Cobb_Connect'
          - 'Perimeter_Post'
          - 'Lewisville_Lake_Lookout'
      mode:
        description: 'scrape | write | both. scrape = refresh Notion DB only. write = run Claude over existing rows only. both = scrape then write.'
        required: false
        default: 'both'
        type: choice
        options:
          - 'both'
          - 'scrape'
          - 'write'
      chain:
        description: 'Continue chain (final full rebuild + review-app deploy — In Search Of is the tail; Meme Corner stays standalone) after this finishes'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      runner:
        description: 'Where to run. auto = the machine of whoever clicked Run if online (runner labeled user-<github-login>), else any online self-hosted runner (e.g. Mac Mini), else cloud. self-hosted / ubuntu-latest force that choice.'
        required: false
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'self-hosted'
          - 'ubuntu-latest'

permissions:
  contents: write
  actions: write

jobs:
  # Pick the runner at runtime so a job never hangs waiting on an offline
  # machine. Preference order for 'auto' (and for chained/scheduled runs):
  #   1. the triggerer's own runner  (label user-<github-login>)  if ONLINE
  #   2. any ONLINE self-hosted runner (e.g. the always-on Mac Mini)
  #   3. ubuntu-latest (GitHub cloud)
  # A manual 'self-hosted' / 'ubuntu-latest' choice forces that and skips detection.
  #
  # Online detection reads the Actions runners API, which GITHUB_TOKEN cannot —
  # set a fine-grained PAT (repo Administration: read) as secret RUNNER_PAT.
  # Without that secret, 'auto' safely degrades to ubuntu-latest (never hangs).
  pick-runner:
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.pick.outputs.label }}
    steps:
      - id: pick
        env:
          RUNNER_PAT:   ${{ secrets.RUNNER_PAT }}
          RUNNER_INPUT: ${{ github.event.inputs.runner }}
          ACTOR:        ${{ github.actor }}
        run: |
          set -euo pipefail
          OVERRIDE="${RUNNER_INPUT:-}"
          if [ "$OVERRIDE" = "self-hosted" ] || [ "$OVERRIDE" = "ubuntu-latest" ]; then
            echo "Forced runner: $OVERRIDE"
            echo "label=$OVERRIDE" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [ -z "${RUNNER_PAT:-}" ]; then
            echo "No RUNNER_PAT secret — can't check which runners are online; using ubuntu-latest."
            echo "label=ubuntu-latest" >> "$GITHUB_OUTPUT"; exit 0
          fi
          runners=$(curl -s -H "Authorization: Bearer $RUNNER_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/runners?per_page=100" || echo '{}')
          want="user-$ACTOR"
          # 1. the triggerer's own machine, if online
          if echo "$runners" | jq -e --arg w "$want" \
              '.runners[]? | select(.status=="online") | .labels[]?.name | ascii_downcase | select(. == ($w|ascii_downcase))' >/dev/null 2>&1; then
            echo "Triggerer's runner is online: $want"
            echo "label=$want" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # 2. any online self-hosted runner (e.g. the Mac Mini)
          if echo "$runners" | jq -e \
              '.runners[]? | select(.status=="online") | .labels[]?.name | select(. == "self-hosted")' >/dev/null 2>&1; then
            echo "Triggerer's machine offline — using a shared self-hosted runner."
            echo "label=self-hosted" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # 3. cloud fallback
          echo "No self-hosted runner online — falling back to ubuntu-latest."
          echo "label=ubuntu-latest" >> "$GITHUB_OUTPUT"

  in_search_of:
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.label }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests anthropic curl_cffi

      # ── Scrape: walks job_sources.py and upserts pending rows ─────────
      - name: Scrape job sources (East Cobb Connect)
        if: ${{ (github.event.inputs.mode || 'both') != 'write' &&
                (github.event.inputs.newsletter == 'East_Cobb_Connect'
                  || github.event.inputs.newsletter == 'all'
                  || github.event.inputs.newsletter == '') }}
        env:
          NOTION_API_KEY:            ${{ secrets.NOTION_API_KEY }}
          NOTION_IN_SEARCH_OF_DB_ID: ${{ secrets.NOTION_IN_SEARCH_OF_DB_ID }}
          NEWSLETTER:                East_Cobb_Connect
          ADZUNA_APP_ID:             ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:            ${{ secrets.ADZUNA_APP_KEY }}
        run: python "In Search Of/Code/scrape_jobs.py"

      - name: Scrape job sources (Perimeter Post)
        if: ${{ (github.event.inputs.mode || 'both') != 'write' &&
                (github.event.inputs.newsletter == 'Perimeter_Post'
                  || github.event.inputs.newsletter == 'all') }}
        env:
          NOTION_API_KEY:            ${{ secrets.NOTION_API_KEY }}
          NOTION_IN_SEARCH_OF_DB_ID: ${{ secrets.NOTION_IN_SEARCH_OF_DB_ID }}
          NEWSLETTER:                Perimeter_Post
          ADZUNA_APP_ID:             ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:            ${{ secrets.ADZUNA_APP_KEY }}
        run: python "In Search Of/Code/scrape_jobs.py"

      - name: Scrape job sources (Lewisville Lake Lookout)
        if: ${{ (github.event.inputs.mode || 'both') != 'write' &&
                (github.event.inputs.newsletter == 'Lewisville_Lake_Lookout'
                  || github.event.inputs.newsletter == 'all') }}
        env:
          NOTION_API_KEY:            ${{ secrets.NOTION_API_KEY }}
          NOTION_IN_SEARCH_OF_DB_ID: ${{ secrets.NOTION_IN_SEARCH_OF_DB_ID }}
          NEWSLETTER:                Lewisville_Lake_Lookout
          ADZUNA_APP_ID:             ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:            ${{ secrets.ADZUNA_APP_KEY }}
        run: python "In Search Of/Code/scrape_jobs.py"

      # ── Write: runs Claude to rewrite scraped snippets into blurbs ────
      - name: Generate In Search Of blurbs
        if: ${{ (github.event.inputs.mode || 'both') != 'scrape' }}
        env:
          CLAUDE_API_KEY:            ${{ secrets.CLAUDE_API_KEY }}
          NOTION_API_KEY:            ${{ secrets.NOTION_API_KEY }}
          NOTION_IN_SEARCH_OF_DB_ID: ${{ secrets.NOTION_IN_SEARCH_OF_DB_ID }}
          NEWSLETTER:                ${{ github.event.inputs.newsletter || 'all' }}
        run: python "In Search Of/Code/In_Search_Of.py"

      # ── Trigger newsletter page rebuild (in_search_of section only) ───
      - name: Trigger newsletter page rebuild
        if: ${{ (github.event.inputs.chain || 'true') == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main","inputs":{"section":"in_search_of"}}'
          echo "✓ Newsletter page rebuild triggered (in_search_of section)"

      # ─── END OF CHAIN — fire ONE full rebuild + ONE deploy ───────────
      # In Search Of is the chain tail. On chained runs every prior section
      # skipped its per-section rebuild + deploy; consolidate them here so we
      # deploy exactly once with every section fresh. (Meme Corner is NOT
      # triggered — it stays standalone until it's finalized.)
      - name: Trigger full newsletter page rebuild (end of chain)
        if: ${{ always() && (github.event.inputs.chain || 'true') == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main","inputs":{"section":"all"}}'
          echo "✓ Full newsletter rebuild triggered (end of chain)"

      - name: Trigger review app deploy (end of chain)
        if: ${{ always() && (github.event.inputs.chain || 'true') == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/deploy_review_app.yml/dispatches \
            -d '{"ref":"main"}'
          echo "✓ Review app deploy triggered (end of chain)"
