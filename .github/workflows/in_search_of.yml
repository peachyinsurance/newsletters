name: Generate In Search Of

# Scrapes per-newsletter job sources, then runs Claude to rewrite each
# scraped snippet into a neighborly hiring blurb. Saves to the In Search
# Of Notion DB; the assembler renders approved (or pending fallback)
# rows in the published section, positioned right before Meme Corner.

on:
  workflow_dispatch:
    inputs:
      newsletter:
        description: 'Which newsletter to generate for. "all" = every newsletter. (East_Cobb_Connect / Perimeter_Post / Lewisville_Lake_Lookout / all)'
        required: false
        default: 'East_Cobb_Connect'
        type: choice
        options:
          - 'all'
          - 'East_Cobb_Connect'
          - 'Perimeter_Post'
          - 'Lewisville_Lake_Lookout'
      mode:
        description: 'scrape | write | both. scrape = refresh Notion DB only. write = run Claude over existing rows only. both = scrape then write.'
        required: false
        default: 'both'
        type: choice
        options:
          - 'both'
          - 'scrape'
          - 'write'
      chain:
        description: 'Continue chain (final full rebuild + review-app deploy — In Search Of is the tail; Meme Corner stays standalone) after this finishes'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  actions: write

jobs:
  in_search_of:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests anthropic curl_cffi

      # ── Scrape: walks job_sources.py and upserts pending rows ─────────
      - name: Scrape job sources (East Cobb Connect)
        if: ${{ (github.event.inputs.mode || 'both') != 'write' &&
                (github.event.inputs.newsletter == 'East_Cobb_Connect'
                  || github.event.inputs.newsletter == 'all'
                  || github.event.inputs.newsletter == '') }}
        env:
          NOTION_API_KEY:            ${{ secrets.NOTION_API_KEY }}
          NOTION_IN_SEARCH_OF_DB_ID: ${{ secrets.NOTION_IN_SEARCH_OF_DB_ID }}
          NEWSLETTER:                East_Cobb_Connect
          ADZUNA_APP_ID:             ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:            ${{ secrets.ADZUNA_APP_KEY }}
        run: python "In Search Of/Code/scrape_jobs.py"

      - name: Scrape job sources (Perimeter Post)
        if: ${{ (github.event.inputs.mode || 'both') != 'write' &&
                (github.event.inputs.newsletter == 'Perimeter_Post'
                  || github.event.inputs.newsletter == 'all') }}
        env:
          NOTION_API_KEY:            ${{ secrets.NOTION_API_KEY }}
          NOTION_IN_SEARCH_OF_DB_ID: ${{ secrets.NOTION_IN_SEARCH_OF_DB_ID }}
          NEWSLETTER:                Perimeter_Post
          ADZUNA_APP_ID:             ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:            ${{ secrets.ADZUNA_APP_KEY }}
        run: python "In Search Of/Code/scrape_jobs.py"

      - name: Scrape job sources (Lewisville Lake Lookout)
        if: ${{ (github.event.inputs.mode || 'both') != 'write' &&
                (github.event.inputs.newsletter == 'Lewisville_Lake_Lookout'
                  || github.event.inputs.newsletter == 'all') }}
        env:
          NOTION_API_KEY:            ${{ secrets.NOTION_API_KEY }}
          NOTION_IN_SEARCH_OF_DB_ID: ${{ secrets.NOTION_IN_SEARCH_OF_DB_ID }}
          NEWSLETTER:                Lewisville_Lake_Lookout
          ADZUNA_APP_ID:             ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:            ${{ secrets.ADZUNA_APP_KEY }}
        run: python "In Search Of/Code/scrape_jobs.py"

      # ── Write: runs Claude to rewrite scraped snippets into blurbs ────
      - name: Generate In Search Of blurbs
        if: ${{ (github.event.inputs.mode || 'both') != 'scrape' }}
        env:
          CLAUDE_API_KEY:            ${{ secrets.CLAUDE_API_KEY }}
          NOTION_API_KEY:            ${{ secrets.NOTION_API_KEY }}
          NOTION_IN_SEARCH_OF_DB_ID: ${{ secrets.NOTION_IN_SEARCH_OF_DB_ID }}
          NEWSLETTER:                ${{ github.event.inputs.newsletter || 'all' }}
        run: python "In Search Of/Code/In_Search_Of.py"

      # ── Trigger newsletter page rebuild (in_search_of section only) ───
      - name: Trigger newsletter page rebuild
        if: ${{ (github.event.inputs.chain || 'true') == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main","inputs":{"section":"in_search_of"}}'
          echo "✓ Newsletter page rebuild triggered (in_search_of section)"

      # ─── END OF CHAIN — fire ONE full rebuild + ONE deploy ───────────
      # In Search Of is the chain tail. On chained runs every prior section
      # skipped its per-section rebuild + deploy; consolidate them here so we
      # deploy exactly once with every section fresh. (Meme Corner is NOT
      # triggered — it stays standalone until it's finalized.)
      - name: Trigger full newsletter page rebuild (end of chain)
        if: ${{ always() && (github.event.inputs.chain || 'true') == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main","inputs":{"section":"all"}}'
          echo "✓ Full newsletter rebuild triggered (end of chain)"

      - name: Trigger review app deploy (end of chain)
        if: ${{ always() && (github.event.inputs.chain || 'true') == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/deploy_review_app.yml/dispatches \
            -d '{"ref":"main"}'
          echo "✓ Review app deploy triggered (end of chain)"
