name: Redo East Cobb Connect

on:
  workflow_dispatch:
    inputs:
      section:
        description: 'Section to reset (pets, restaurants, or events)'
        required: true

jobs:
  redo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Sync Notion statuses back to pending
        env:
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:        ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          NOTION_EVENTS_DB_ID:      ${{ secrets.NOTION_EVENTS_DB_ID }}
          NEWSLETTER_NAME:          East_Cobb_Connect
          SECTION:                  ${{ github.event.inputs.section }}
        run: python NewsletterCreation/Code/redo_section.py

      - name: Trigger newsletter page rebuild
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main","inputs":{"section":"all"}}'
          echo "✓ Newsletter page rebuild triggered"
