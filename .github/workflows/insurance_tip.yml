name: Generate Insurance Tip

on:
  workflow_dispatch:
    inputs:
      newsletter:
        description: 'Which newsletter to generate for. "all" = the shared-tip pattern (saves identical row to each newsletter). Filtered = single-newsletter mode. (East_Cobb_Connect / Perimeter_Post / Lewisville_Lake_Lookout / all)'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'East_Cobb_Connect'
          - 'Perimeter_Post'
          - 'Lewisville_Lake_Lookout'
      chain:
        description: 'Continue chain (Reader Poll) after this finishes'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests anthropic
      - name: Generate Insurance Tip
        env:
          CLAUDE_API_KEY:           ${{ secrets.CLAUDE_API_KEY }}
          BRAVE_NEWS_API_KEY:       ${{ secrets.BRAVE_NEWS_API_KEY }}
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:        ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          NOTION_TIPS_DB_ID:        ${{ secrets.NOTION_TIPS_DB_ID }}
          NEWSLETTER:               ${{ github.event.inputs.newsletter || 'all' }}
        run: python "Insurance Tip/Code/Insurance_Tip.py"
      - name: Trigger newsletter page rebuild
        if: ${{ (github.event.inputs.chain || 'true') == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main","inputs":{"section":"tip"}}'
          echo "✓ Newsletter page rebuild triggered"

      - name: Trigger next in chain (Reader Poll)
        if: ${{ always() && (github.event.inputs.chain || 'true') == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/poll.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"newsletter\":\"${{ github.event.inputs.newsletter || 'all' }}\",\"chain\":\"true\"}}"
          echo "→ Triggered Reader Poll"
