name: Deploy Review App

on:
  push:
    branches:
      - main
    paths:
      - 'review-app/**'
  workflow_dispatch:

# Collapse overlapping deploys into one — every assemble (and several approve
# flows) dispatch this, so rapid back-to-back triggers would otherwise race on
# the gh-pages push. cancel-in-progress keeps only the latest, which reflects
# the freshest Notion data anyway.
concurrency:
  group: deploy-review-app
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Export Notion data
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:           ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID:    ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          NOTION_EVENTS_DB_ID:         ${{ secrets.NOTION_EVENTS_DB_ID }}
          NOTION_BUSINESS_BRIEF_DB_ID: ${{ secrets.NOTION_BUSINESS_BRIEF_DB_ID }}
          NOTION_MEMES_DB_ID:          ${{ secrets.NOTION_MEMES_DB_ID }}
          NOTION_TIPS_DB_ID:           ${{ secrets.NOTION_TIPS_DB_ID }}
          NOTION_IN_SEARCH_OF_DB_ID:   ${{ secrets.NOTION_IN_SEARCH_OF_DB_ID }}
        run: |
          pip install requests
          cd NewsletterCreation/Code
          python export_notion_data.py
          cp pets.json ../../review-app/public/pets.json
          cp restaurants.json ../../review-app/public/restaurants.json
          cp events.json ../../review-app/public/events.json
          cp business_briefs.json ../../review-app/public/business_briefs.json
          cp memes.json ../../review-app/public/memes.json
          cp insurance_tips.json ../../review-app/public/insurance_tips.json
          cp in_search_of.json ../../review-app/public/in_search_of.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: review-app/package-lock.json

      - name: Install dependencies
        run: |
          cd review-app
          npm ci

      - name: Build
        run: |
          cd review-app
          rm -rf dist
          npm run build

      # NOTE: We intentionally do NOT snapshot gifs/ into the build dir here.
      # That old "preserve" step grabbed gh-pages' gifs/ at job start, then
      # the full-replace deploy below republished that stale copy — clobbering
      # any RE/event images other workflows pushed AFTER the snapshot (a race
      # the snapshot model can't win). Instead, keep_files:true below leaves
      # the live gifs/ directory untouched. gifs/ is owned solely by the
      # image-publishing workflows (real_estate, featured_event, restaurant,
      # weekend_planner, …); the deploy only manages the review-app build.

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./review-app/dist
          # Don't wipe files absent from publish_dir — preserves gifs/ images
          # published by the content workflows so their Notion URLs don't 404.
          keep_files: true
