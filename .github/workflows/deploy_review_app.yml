name: Deploy Review App

on:
  push:
    branches:
      - main
    paths:
      - 'review-app/**'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Export Notion data
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:           ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID:    ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          NOTION_EVENTS_DB_ID:         ${{ secrets.NOTION_EVENTS_DB_ID }}
          NOTION_BUSINESS_BRIEF_DB_ID: ${{ secrets.NOTION_BUSINESS_BRIEF_DB_ID }}
          NOTION_MEMES_DB_ID:          ${{ secrets.NOTION_MEMES_DB_ID }}
        run: |
          pip install requests
          cd NewsletterCreation/Code
          python export_notion_data.py
          cp pets.json ../../review-app/public/pets.json
          cp restaurants.json ../../review-app/public/restaurants.json
          cp events.json ../../review-app/public/events.json
          cp business_briefs.json ../../review-app/public/business_briefs.json
          cp memes.json ../../review-app/public/memes.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: review-app/package-lock.json

      - name: Install dependencies
        run: |
          cd review-app
          npm ci

      - name: Build
        run: |
          cd review-app
          rm -rf dist
          npm run build

      - name: Preserve existing GIFs/images from gh-pages
        run: |
          git fetch origin gh-pages || true
          git checkout origin/gh-pages -- gifs/ 2>/dev/null || true
          if [ -d "gifs" ]; then
            cp -r gifs review-app/dist/gifs
            echo "✓ Preserved $(ls gifs/ | wc -l) files from gifs/"
          else
            echo "No existing gifs/ to preserve"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./review-app/dist
