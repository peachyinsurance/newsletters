name: Deploy Review App

on:
  push:
    branches:
      - main
    paths:
      - 'review-app/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Export Notion data
        env:
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:        ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
        run: |
          pip install requests
          cd Code
          python export_notion_data.py
          cp pets.json ../review-app/public/pets.json
          cp restaurants.json ../review-app/public/restaurants.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: review-app/package-lock.json

      - name: Install dependencies
        run: |
          cd review-app
          npm ci

      - name: Build
        run: |
          cd review-app
          rm -rf dist
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./review-app/dist
