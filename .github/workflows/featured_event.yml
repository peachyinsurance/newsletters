name: Generate Featured Event

on:
  workflow_dispatch:
    inputs:
      newsletter:
        description: 'Which newsletter to generate for. "all" = every newsletter. (East_Cobb_Connect / Perimeter_Post / Lewisville_Lake_Lookout / all)'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'East_Cobb_Connect'
          - 'Perimeter_Post'
          - 'Lewisville_Lake_Lookout'
      chain:
        description: 'Continue chain (Free Events → Local Lowdown → ...) after this finishes'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests anthropic beautifulsoup4 curl_cffi
      - name: Generate Featured Event
        env:
          CLAUDE_API_KEY:           ${{ secrets.CLAUDE_API_KEY }}
          BRAVE_NEWS_API_KEY:       ${{ secrets.BRAVE_NEWS_API_KEY }}
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:        ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          NOTION_EVENTS_DB_ID:      ${{ secrets.NOTION_EVENTS_DB_ID }}
          NEWSLETTER:               ${{ github.event.inputs.newsletter || 'all' }}
        run: python "Featured Event/Code/Featured_Event.py"
      - name: Commit Brave cache for local debugging
        if: ${{ always() }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only do anything if the cache dir has files
          if [ -d "Featured Event/Code/brave_cache" ] && [ -n "$(ls -A 'Featured Event/Code/brave_cache' 2>/dev/null)" ]; then
            git add "Featured Event/Code/brave_cache"
            if git diff --staged --quiet; then
              echo "No cache changes to commit"
            else
              git commit -m "chore: update Featured Event Brave cache [skip ci]"
              # Stash any other working-tree changes (e.g. output/*.json the
              # pipeline writes) so the rebase doesn't refuse to run.
              git stash --include-untracked || true
              for attempt in 1 2 3; do
                git pull --rebase origin main && git push origin HEAD:main && break
                echo "Push attempt $attempt failed, retrying..."
                sleep 3
              done
              # Restore the stashed files (best effort)
              git stash pop || true
            fi
          else
            echo "No cache dir or empty; skipping commit"
          fi
      - name: Trigger newsletter page rebuild
        if: ${{ (github.event.inputs.chain || 'true') == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main","inputs":{"section":"featured_event"}}'
          echo "✓ Newsletter page rebuild triggered"

      - name: Trigger next in chain (Free Events)
        if: ${{ always() && (github.event.inputs.chain || 'true') == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/free_events.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"newsletter\":\"${{ github.event.inputs.newsletter || 'all' }}\",\"chain\":\"true\"}}"
          echo "→ Triggered Free Events"
