name: Generate Featured Event

on:
  workflow_dispatch:
    inputs:
      newsletter:
        description: 'Which newsletter to generate for. "all" = every newsletter. (East_Cobb_Connect / Perimeter_Post / Lewisville_Lake_Lookout / all)'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'East_Cobb_Connect'
          - 'Perimeter_Post'
          - 'Lewisville_Lake_Lookout'
      chain:
        description: 'Continue chain (Free Events → Local Lowdown → ...) after this finishes'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      data_source:
        description: 'Where to pull events from. "notion" = use whatever the last scrape saved (fast). "scrape" = re-run web scrapers first to refresh the Notion DB. CHAIN RUNS: leave this on "notion". The chain is launched from "Scrape Weekend Events", which scrapes once; data_source is NOT forwarded downstream, so set "scrape" here only for an isolated standalone run of this workflow.'
        required: false
        default: 'notion'
        type: choice
        options:
          - 'notion'
          - 'scrape'
      issue_date:
        description: 'Issue date (MM/DD/YYYY). Empty = upcoming Thursday. Targets that Thursday through next Wednesday.'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install requests anthropic beautifulsoup4 curl_cffi Pillow
          # Open Sans (closest open-source analog to Canva Sans) for the
          # Canva-style header + body composites.
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-open-sans || true
      # ── Optional pre-scrape (data_source == 'scrape') ───────────────────
      # When the user picks "scrape" from the dropdown, refresh the Notion
      # Weekend Events DB by running each scraper before the picker runs.
      # Default ('notion') skips all four steps and the picker reads what's
      # already in the DB.
      - name: Refresh travelcobb.org
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  East_Cobb_Connect
        run: python "Weekend Events/Code/East_Cobb_Connect/travel_cobb.py"

      - name: Refresh visitmariettaga.com
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  East_Cobb_Connect
        run: python "Weekend Events/Code/East_Cobb_Connect/visit_marietta.py"

      - name: Refresh kennesaw-ga.gov
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  East_Cobb_Connect
        run: python "Weekend Events/Code/East_Cobb_Connect/kennesaw.py"

      - name: Refresh Sandy Springs (ECC_PP shared pool)
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  ECC_PP
        run: python "Weekend Events/Code/Perimeter_Post/sandy_springs.py"

      - name: Refresh discoverdunwoody.com (Perimeter Post)
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  Perimeter_Post
        run: python "Weekend Events/Code/Perimeter_Post/discover_dunwoody.py"

      - name: Refresh dunwoodyga.gov calendar (Perimeter Post)
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  Perimeter_Post
        run: python "Weekend Events/Code/Perimeter_Post/dunwoody_gov.py"

      - name: Refresh patch.com/georgia/dunwoody (Perimeter Post)
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  Perimeter_Post
        run: python "Weekend Events/Code/Perimeter_Post/patch_dunwoody.py"

      - name: Refresh visitroswellga.com (ECC_PP shared)
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  ECC_PP
        run: python "Weekend Events/Code/Perimeter_Post/visit_roswell.py"

      - name: Refresh roswell365.com (ECC_PP shared)
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  ECC_PP
        run: python "Weekend Events/Code/Perimeter_Post/roswell_365.py"

      - name: Refresh chattnaturecenter.org (ECC_PP shared)
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  ECC_PP
        run: python "Weekend Events/Code/Perimeter_Post/chatt_nature_center.py"

      - name: Refresh cobbcounty.gov
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  East_Cobb_Connect
        run: python "Weekend Events/Code/East_Cobb_Connect/cobb_county.py"
      # ── Post-scrape sweep: retag shared-city rows ──────────────────────
      - name: Normalize city tags (shared-city sweep)
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
        run: python "Weekend Events/Code/utilities/normalize_city_tags.py"


      - name: Generate Featured Event
        env:
          CLAUDE_API_KEY:              ${{ secrets.CLAUDE_API_KEY }}
          BRAVE_NEWS_API_KEY:          ${{ secrets.BRAVE_NEWS_API_KEY }}
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:           ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID:    ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          NOTION_EVENTS_DB_ID:         ${{ secrets.NOTION_EVENTS_DB_ID }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  ${{ github.event.inputs.newsletter || 'all' }}
          ISSUE_DATE:                  ${{ github.event.inputs.issue_date || '' }}
        run: python "Featured Event/Code/Featured_Event.py"

      - name: Publish header previews + event GIFs to gh-pages
        if: ${{ always() }}
        run: |
          set -e
          shopt -s nullglob
          pngs=("Beehiiv/Code/output/Newsletter_Header_image_"*.png)
          gifs=("Beehiiv/Code/output/event_gif_"*.gif)
          if [ ${#pngs[@]} -eq 0 ] && [ ${#gifs[@]} -eq 0 ]; then
            echo "No header previews or event GIFs to publish"
            exit 0
          fi
          mkdir -p /tmp/event_assets
          [ ${#pngs[@]} -gt 0 ] && cp "${pngs[@]}" /tmp/event_assets/
          [ ${#gifs[@]} -gt 0 ] && cp "${gifs[@]}" /tmp/event_assets/
          count=$(ls /tmp/event_assets | wc -l)
          echo "Staged $count asset(s) to /tmp"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked || true
          git fetch origin gh-pages
          git checkout gh-pages
          mkdir -p gifs
          cp /tmp/event_assets/* gifs/
          git add gifs/
          if git diff --staged --quiet; then
            echo "No new assets to publish"
          else
            git commit -m "publish featured-event assets [skip ci]"
            git push origin gh-pages
            echo "✓ Published $count asset(s) to gh-pages/gifs/"
          fi
          git checkout main
          git stash pop || true

      - name: Trigger newsletter page rebuild
        if: ${{ (github.event.inputs.chain || 'true') == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main","inputs":{"section":"featured_event"}}'
          echo "✓ Newsletter page rebuild triggered"

      - name: Refresh review app (re-export events.json to gh-pages)
        if: ${{ always() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/deploy_review_app.yml/dispatches \
            -d '{"ref":"main"}'
          echo "→ Triggered Deploy Review App"

      - name: Trigger next in chain (Free Events)
        if: ${{ always() && (github.event.inputs.chain || 'true') == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/free_events.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"newsletter\":\"${{ github.event.inputs.newsletter || 'all' }}\",\"chain\":\"true\",\"issue_date\":\"${{ github.event.inputs.issue_date || '' }}\"}}"
          echo "→ Triggered Free Events"
