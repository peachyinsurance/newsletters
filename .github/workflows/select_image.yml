name: Select Featured Event Image

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'Featured Event Source URL (identifies the Notion row)'
        required: true
        type: string
      image_url:
        description: 'Image URL to set as the featured image'
        required: true
        type: string
      newsletter:
        description: 'Newsletter name (East_Cobb_Connect / Perimeter_Post / Lewisville_Lake_Lookout)'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install requests Pillow
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-open-sans || true
      - name: Update Notion + build Canva composite
        env:
          NOTION_API_KEY:      ${{ secrets.NOTION_API_KEY }}
          NOTION_EVENTS_DB_ID: ${{ secrets.NOTION_EVENTS_DB_ID }}
          SOURCE_URL:          ${{ github.event.inputs.source_url }}
          IMAGE_URL:           ${{ github.event.inputs.image_url }}
          NEWSLETTER:          ${{ github.event.inputs.newsletter }}
        run: python "Featured Event/Code/select_image.py"

      - name: Publish header composite to gh-pages
        if: ${{ always() }}
        run: |
          set -e
          shopt -s nullglob
          imgs=("Beehiiv/Code/output/Newsletter_Header_image_"*.png)
          if [ ${#imgs[@]} -eq 0 ]; then
            echo "No composite generated; nothing to publish"
            exit 0
          fi
          # Copy the generated PNGs to a location OUTSIDE the working tree
          # so the gh-pages branch switch doesn't wipe them.
          mkdir -p /tmp/header_previews
          cp "${imgs[@]}" /tmp/header_previews/
          echo "Staged $(ls /tmp/header_previews | wc -l) PNG(s) to /tmp"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked || true
          git fetch origin gh-pages
          git checkout gh-pages
          mkdir -p gifs
          cp /tmp/header_previews/*.png gifs/
          git add gifs/
          if git diff --staged --quiet; then
            echo "No composite changes to publish"
          else
            git commit -m "update featured event header [skip ci]"
            git push origin gh-pages
            echo "✓ Header composite published to gh-pages/gifs/"
          fi
          git checkout main
          git stash pop || true

      - name: Refresh review app (re-export events.json)
        if: ${{ always() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/deploy_review_app.yml/dispatches \
            -d '{"ref":"main"}'
          echo "→ Triggered Deploy Review App"

      - name: Trigger full landing-page rebuild (refresh hero image)
        if: ${{ always() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Full rebuild (no section input) is required because the hero
          # image lives at the page top — Notion's API only supports
          # appending, not prepending, so partial section updates can't
          # reposition it. Full rebuild clears + re-renders in order.
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main","inputs":{"section":"all"}}'
          echo "→ Triggered full Assemble Newsletter Pages rebuild"
