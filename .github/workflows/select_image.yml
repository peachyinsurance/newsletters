name: Select Featured Event Image

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'Featured Event Source URL (identifies the Notion row)'
        required: true
        type: string
      image_url:
        description: 'Image URL to set as the featured image'
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Update Notion Image URL
        env:
          NOTION_API_KEY:      ${{ secrets.NOTION_API_KEY }}
          NOTION_EVENTS_DB_ID: ${{ secrets.NOTION_EVENTS_DB_ID }}
          SOURCE_URL:          ${{ github.event.inputs.source_url }}
          IMAGE_URL:           ${{ github.event.inputs.image_url }}
        run: python "Featured Event/Code/select_image.py"

      - name: Refresh review app (re-export events.json)
        if: ${{ always() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/deploy_review_app.yml/dispatches \
            -d '{"ref":"main"}'
          echo "→ Triggered Deploy Review App"
