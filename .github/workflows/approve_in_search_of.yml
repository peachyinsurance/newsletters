name: Approve In Search Of

on:
  workflow_dispatch:
    inputs:
      job_listings_url:
        description: 'Job Listings URL of the row to approve (Mode 1)'
        required: false
        default: ''
      newsletter:
        description: 'Newsletter the row belongs to'
        required: false
        default: ''
      reject_remaining:
        description: 'If "true", flip all pending In Search Of rows for this newsletter to rejected. Use after approving your picks.'
        required: false
        default: ''
      set_selection:
        description: 'If "true", make approved_permalinks the EXACT approved set (Submit selection): listed URLs → approved, deselected approved rows → pending.'
        required: false
        default: ''
      approved_permalinks:
        description: 'Comma-separated Job Listings URLs (KEEP list for reject-remaining, or the exact approved set for set_selection)'
        required: false
        default: ''

permissions:
  contents: write
  actions: write

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Sync approval to Notion
        env:
          NOTION_API_KEY:            ${{ secrets.NOTION_API_KEY }}
          NOTION_IN_SEARCH_OF_DB_ID: ${{ secrets.NOTION_IN_SEARCH_OF_DB_ID }}
          JOB_LISTINGS_URL:          ${{ github.event.inputs.job_listings_url }}
          NEWSLETTER:                ${{ github.event.inputs.newsletter }}
          REJECT_REMAINING:          ${{ github.event.inputs.reject_remaining }}
          SET_SELECTION:             ${{ github.event.inputs.set_selection }}
          APPROVED_URLS:             ${{ github.event.inputs.approved_permalinks }}
        run: python "In Search Of/Code/approve_in_search_of.py"

      - name: Trigger newsletter page rebuild
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main","inputs":{"section":"in_search_of"}}'
          echo "✓ Newsletter page rebuild triggered"
