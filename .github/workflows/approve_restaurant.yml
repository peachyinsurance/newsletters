name: Approve Restaurant

on:
  workflow_dispatch:
    inputs:
      place_id:
        description: 'Google Place ID of the restaurant to approve'
        required: true

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Sync approval to Notion
        env:
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:        ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          APPROVED_PLACE_ID:        ${{ github.event.inputs.place_id }}
        run: python Restaurants/Code/approve_restaurant.py

      - name: Trigger newsletter page rebuild
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/couch2coders/NewsletterAutomation/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main"}'
          echo "✓ Newsletter page rebuild triggered"
