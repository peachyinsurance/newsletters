name: Generate Local Lowdown

on:
  schedule:
    - cron: '0 13 * * 3'  # Every Wednesday at 8am EST (1pm UTC)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests anthropic
      - name: Generate Local Lowdown sections
        env:
          CLAUDE_API_KEY:           ${{ secrets.CLAUDE_API_KEY }}
          APIFY_API_KEY:            ${{ secrets.APIFY_API_KEY }}
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:        ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          NOTION_LOWDOWN_DB_ID:     ${{ secrets.NOTION_LOWDOWN_DB_ID }}
        run: python Code/Local_Lowdown.py
      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: local-lowdown-output
          path: Code/output/lowdown_*.md
          if-no-files-found: ignore
