name: Redo Perimeter Post

on:
  workflow_dispatch:
    inputs:
      section:
        description: 'Section to reset (pets or restaurants)'
        required: true

jobs:
  redo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Redo section and update gh-pages JSON
        env:
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:        ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          NEWSLETTER_NAME:          Perimeter_Post
          SECTION:                  ${{ github.event.inputs.section }}
          GITHUB_TOKEN:             ${{ secrets.PAT_TOKEN }}
        run: python Code/redo_section.py
