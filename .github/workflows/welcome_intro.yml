name: Generate Welcome Intro

on:
  schedule:
    - cron: '0 14 * * 3'  # Every Wednesday at 9am EST (2pm UTC) — runs after lowdown & real estate
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests anthropic

      - name: Generate Welcome Intro
        env:
          CLAUDE_API_KEY:           ${{ secrets.CLAUDE_API_KEY }}
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_INTRO_DB_ID:       ${{ secrets.NOTION_INTRO_DB_ID }}
          NOTION_PETS_DB_ID:        ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          NOTION_LOWDOWN_DB_ID:     ${{ secrets.NOTION_LOWDOWN_DB_ID }}
          NOTION_RE_DB_ID:          ${{ secrets.NOTION_RE_DB_ID }}
          NOTION_EVENTS_DB_ID:      ${{ secrets.NOTION_EVENTS_DB_ID }}
        run: python "Welcome Intro/Code/Welcome_Intro.py"

      - name: Trigger newsletter page rebuild
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main"}'
          echo "✓ Newsletter page rebuild triggered"
