name: Approve Pet Blurb

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'URL of the approved pet'
        required: true

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r Code/requirements.txt
     
      - name: Install dependencies
        run: pip install anthropic requests notion-client
        
      - name: Run approval script
        env:
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:        ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          APPROVED_URL:             ${{ inputs.source_url }}
          BEEHIIV_API_KEY:          ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID:   ${{ secrets.BEEHIIV_PUBLICATION_ID }}
        run: python Code/approve_pet.py
      
