name: Generate Newsletter - Pet Adoption
 
on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9am UTC
  workflow_dispatch:        # Allows manual trigger from GitHub UI
 
jobs:
  generate:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install -r NewsletterCreation/Code/requirements.txt

      - name: Install dependencies
        run: pip install anthropic requests notion-client
 
      - name: Run newsletter script
        env:
          CLAUDE_API_KEY:          ${{ secrets.CLAUDE_API_KEY }}
          APIFY_API_KEY:           ${{ secrets.APIFY_API_KEY }}
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:        ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          RESCUE_GROUP_API_KEY:    ${{ secrets.RESCUE_GROUP_API_KEY }}
        run: python Pets/Code/Furry_Friends_Marietta.py

      - name: Trigger deploy to refresh review app
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/couch2coders/NewsletterAutomation/actions/workflows/deploy_review_app.yml/dispatches \
            -d '{"ref":"main"}'
          echo "✓ Deploy triggered"
