name: Generate Newsletter - Pet Adoption

# NOTE: This workflow used to start the Monday chain on its own cron.
# That moved to weekend_events.yml (the scraper), which now triggers
# this job at the end of its run. Keeping workflow_dispatch so ad-hoc
# re-runs of just Pets are still possible.
on:
  workflow_dispatch:        # Allows manual trigger from GitHub UI
    inputs:
      newsletter:
        description: 'Which newsletter to generate for. "all" = every newsletter. (East_Cobb_Connect / Perimeter_Post / Lewisville_Lake_Lookout / all)'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'East_Cobb_Connect'
          - 'Perimeter_Post'
          - 'Lewisville_Lake_Lookout'
      chain:
        description: 'Continue chain (Restaurants → Featured Event → ...) after this finishes'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      issue_date:
        description: 'Issue date (MM/DD/YYYY). Empty = scheduled cadence. Propagates through the chain to all event-driven sections.'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: write

jobs:
  generate:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install -r NewsletterCreation/Code/requirements.txt

      - name: Install dependencies
        run: pip install anthropic requests notion-client Pillow
 
      - name: Run newsletter script
        env:
          CLAUDE_API_KEY:           ${{ secrets.CLAUDE_API_KEY }}
          RESCUE_GROUP_API_KEY:     ${{ secrets.RESCUE_GROUP_API_KEY }}
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:        ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          NEWSLETTER:               ${{ github.event.inputs.newsletter || 'all' }}
        run: python Pets/Code/Furry_Friends_Marietta.py

      - name: Publish GIFs to gh-pages
        # Publish even if the Python step crashed midway — earlier newsletters
        # in the run may have saved Notion rows referencing GIF URLs that
        # exist only on the runner's local disk. Without this, those URLs
        # become 404s.
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ls Pets/Code/output/*.gif 1>/dev/null 2>&1 || ls Pets/Code/output/*.webp 1>/dev/null 2>&1; then
            cp -r Pets/Code/output /tmp/pet_gifs
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git stash --include-untracked || true
            git fetch origin gh-pages
            git checkout gh-pages
            mkdir -p gifs
            # Do NOT wipe existing pet GIFs. A pet's GIF URL is written to its
            # Notion row at generation time but the pet may not be SENT until a
            # later cycle (after review/approval). Wiping all pet_*.gif on every
            # run deleted the file out from under an approved-but-unsent pet, so
            # Beehiiv's live hotlink 404'd (Notion still showed it from its own
            # server-side image cache, masking the problem). We now only add /
            # overwrite same-named files; old GIFs persist (~9KB each) until a
            # dedicated cleanup prunes them.
            cp /tmp/pet_gifs/*.gif gifs/ 2>/dev/null || true
            cp /tmp/pet_gifs/*.webp gifs/ 2>/dev/null || true
            git add gifs/
            git commit -m "update pet GIFs" || true
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/peachyinsurance/newsletters.git
            git push origin gh-pages
            git checkout main
            git stash pop || true
            echo "✓ Pet GIFs published"
          else
            echo "No GIFs to publish"
          fi

      - name: Trigger deploy to refresh review app
        if: ${{ (github.event.inputs.chain || 'true') == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/deploy_review_app.yml/dispatches \
            -d '{"ref":"main"}'
          echo "✓ Deploy triggered"

      - name: Trigger next in chain (Restaurants)
        if: ${{ always() && (github.event.inputs.chain || 'true') == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/restaurant.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"newsletter\":\"${{ github.event.inputs.newsletter || 'all' }}\",\"chain\":\"true\",\"issue_date\":\"${{ github.event.inputs.issue_date || '' }}\"}}"
          echo "→ Triggered Restaurant Pipeline"
