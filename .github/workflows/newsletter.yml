name: Generate Newsletter - Pet Adoption
 
on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9am UTC
  workflow_dispatch:        # Allows manual trigger from GitHub UI
 
jobs:
  generate:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install -r NewsletterCreation/Code/requirements.txt

      - name: Install dependencies
        run: pip install anthropic requests notion-client Pillow curl_cffi beautifulsoup4
 
      - name: Run newsletter script
        env:
          CLAUDE_API_KEY:          ${{ secrets.CLAUDE_API_KEY }}
          APIFY_API_KEY:           ${{ secrets.APIFY_API_KEY }}
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_PETS_DB_ID:        ${{ secrets.NOTION_PETS_DB_ID }}
          NOTION_RESTAURANTS_DB_ID: ${{ secrets.NOTION_RESTAURANTS_DB_ID }}
          RESCUE_GROUP_API_KEY:    ${{ secrets.RESCUE_GROUP_API_KEY }}
        run: python Pets/Code/Furry_Friends_Marietta.py

      - name: Publish GIFs to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if ls Pets/Code/output/*.gif 1>/dev/null 2>&1 || ls Pets/Code/output/*.webp 1>/dev/null 2>&1; then
            cp -r Pets/Code/output /tmp/pet_gifs
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git stash --include-untracked || true
            git fetch origin gh-pages
            git checkout gh-pages
            mkdir -p gifs
            rm -f gifs/pet_*.gif gifs/pet_*.webp 2>/dev/null || true
            cp /tmp/pet_gifs/*.gif gifs/ 2>/dev/null || true
            cp /tmp/pet_gifs/*.webp gifs/ 2>/dev/null || true
            git add gifs/
            git commit -m "update pet GIFs" || true
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/peachyinsurance/newsletters.git
            git push origin gh-pages
            git checkout main
            git stash pop || true
            echo "✓ Pet GIFs published"
          else
            echo "No GIFs to publish"
          fi

      - name: Trigger deploy to refresh review app
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/deploy_review_app.yml/dispatches \
            -d '{"ref":"main"}'
          echo "✓ Deploy triggered"
