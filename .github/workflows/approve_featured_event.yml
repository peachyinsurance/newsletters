name: Approve Featured Event

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'Source URL of the featured event to approve'
        required: true

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Sync approval to Notion
        env:
          NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
          NOTION_EVENTS_DB_ID: ${{ secrets.NOTION_EVENTS_DB_ID }}
          APPROVED_URL:             ${{ github.event.inputs.source_url }}
        run: python "Featured Event/Code/approve_event.py"

      - name: Trigger newsletter page rebuild
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main","inputs":{"section":"featured_event"}}'
          echo "✓ Newsletter page rebuild triggered"