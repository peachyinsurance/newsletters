name: Generate Weekend Planner

on:
  workflow_dispatch:
    inputs:
      newsletter:
        description: 'Which newsletter to generate for. "all" = every newsletter. (East_Cobb_Connect / Perimeter_Post / Lewisville_Lake_Lookout / all)'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'East_Cobb_Connect'
          - 'Perimeter_Post'
          - 'Lewisville_Lake_Lookout'
      chain:
        description: 'Continue chain (Business Brief → Insurance Tip → Reader Poll) after this finishes'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      data_source:
        description: 'Where to pull events from. "notion" = use whatever the last scrape saved (fast). "scrape" = re-run web scrapers first to refresh the Notion DB. CHAIN RUNS: leave this on "notion". The chain is launched from "Scrape Weekend Events", which scrapes once; data_source is NOT forwarded downstream, so set "scrape" here only for an isolated standalone run of this workflow.'
        required: false
        default: 'notion'
        type: choice
        options:
          - 'notion'
          - 'scrape'
      issue_date:
        description: 'Issue date (MM/DD/YYYY). Empty = upcoming Thursday. Targets that week''s Fri/Sat/Sun.'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install requests anthropic beautifulsoup4 curl_cffi Pillow
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-open-sans || true
      # ── Optional pre-scrape (data_source == 'scrape') ───────────────────
      - name: Refresh travelcobb.org
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  East_Cobb_Connect
        run: python "Weekend Events/Code/East_Cobb_Connect/travel_cobb.py"

      - name: Refresh visitmariettaga.com
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  East_Cobb_Connect
        run: python "Weekend Events/Code/East_Cobb_Connect/visit_marietta.py"

      - name: Refresh kennesaw-ga.gov
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  East_Cobb_Connect
        run: python "Weekend Events/Code/East_Cobb_Connect/kennesaw.py"

      - name: Refresh Sandy Springs (ECC_PP shared pool)
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  ECC_PP
        run: python "Weekend Events/Code/Perimeter_Post/sandy_springs.py"

      - name: Refresh Springs Cinema & Taphouse (ECC_PP shared pool)
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  ECC_PP
        run: python "Weekend Events/Code/Perimeter_Post/springs_cinema.py"

      - name: Refresh discoverdunwoody.com (Perimeter Post)
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  Perimeter_Post
        run: python "Weekend Events/Code/Perimeter_Post/discover_dunwoody.py"

      - name: Refresh dunwoodyga.gov calendar (Perimeter Post)
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  Perimeter_Post
        run: python "Weekend Events/Code/Perimeter_Post/dunwoody_gov.py"

      - name: Refresh patch.com/georgia/dunwoody (Perimeter Post)
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  Perimeter_Post
        run: python "Weekend Events/Code/Perimeter_Post/patch_dunwoody.py"

      - name: Refresh visitroswellga.com (ECC_PP shared)
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  ECC_PP
        run: python "Weekend Events/Code/Perimeter_Post/visit_roswell.py"

      - name: Refresh roswell365.com (ECC_PP shared)
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  ECC_PP
        run: python "Weekend Events/Code/Perimeter_Post/roswell_365.py"

      - name: Refresh chattnaturecenter.org (ECC_PP shared)
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  ECC_PP
        run: python "Weekend Events/Code/Perimeter_Post/chatt_nature_center.py"

      - name: Refresh cobbcounty.gov
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  East_Cobb_Connect
        run: python "Weekend Events/Code/East_Cobb_Connect/cobb_county.py"

      - name: Refresh The Battery Atlanta
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                  East_Cobb_Connect
        run: python "Weekend Events/Code/East_Cobb_Connect/battery_atlanta.py"
      # ── Post-scrape sweep: retag shared-city rows ──────────────────────
      - name: Normalize city tags (shared-city sweep)
        if: ${{ github.event.inputs.data_source == 'scrape' }}
        env:
          NOTION_API_KEY:              ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_EVENTS_DB_ID: ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
        run: python "Weekend Events/Code/utilities/normalize_city_tags.py"


      - name: Generate Weekend Planner
        env:
          CLAUDE_API_KEY:               ${{ secrets.CLAUDE_API_KEY }}
          BRAVE_NEWS_API_KEY:           ${{ secrets.BRAVE_NEWS_API_KEY }}
          NOTION_API_KEY:               ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_PLANNER_DB_ID: ${{ secrets.NOTION_WEEKEND_PLANNER_DB_ID }}
          NOTION_WEEKEND_EVENTS_DB_ID:  ${{ secrets.NOTION_WEEKEND_EVENTS_DB_ID }}
          NEWSLETTER:                   ${{ github.event.inputs.newsletter || 'all' }}
          ISSUE_DATE:                   ${{ github.event.inputs.issue_date || '' }}
        run: python "Weekend Planner/Code/Weekend_Planner.py"

      - name: Publish Weekend Planner images to gh-pages
        if: ${{ always() }}
        run: |
          set -e
          shopt -s nullglob
          # Banner PNG no longer produced (Canva template removed for WP),
          # but glob is harmless if it ever returns. Event JPGs are the
          # resized per-event photos written by Weekend_Planner.py.
          banners=("Beehiiv/Code/output/Weekend_Planner_Banner_"*.png)
          events=("Beehiiv/Code/output/wp_event_"*.jpg)
          if [ ${#banners[@]} -eq 0 ] && [ ${#events[@]} -eq 0 ]; then
            echo "No Weekend Planner images to publish"
            exit 0
          fi
          mkdir -p /tmp/wp_images
          [ ${#banners[@]} -gt 0 ] && cp "${banners[@]}" /tmp/wp_images/ || true
          [ ${#events[@]}  -gt 0 ] && cp "${events[@]}"  /tmp/wp_images/ || true
          count=$(ls /tmp/wp_images | wc -l)
          echo "Staged $count image(s) to /tmp"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked || true
          git fetch origin gh-pages
          git checkout gh-pages
          mkdir -p gifs
          cp /tmp/wp_images/* gifs/
          git add gifs/
          if git diff --staged --quiet; then
            echo "No image changes to publish"
          else
            git commit -m "publish weekend planner images [skip ci]"
            git push origin gh-pages
            echo "✓ Published $count Weekend Planner image(s)"
          fi
          git checkout main
          git stash pop || true

      - name: Trigger newsletter page rebuild
        if: ${{ (github.event.inputs.chain || 'true') == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main","inputs":{"section":"weekend_planner"}}'
          echo "✓ Newsletter page rebuild triggered (weekend_planner section)"

      - name: Trigger next in chain (Business Brief)
        if: ${{ always() && (github.event.inputs.chain || 'true') == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/business_brief.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"newsletter\":\"${{ github.event.inputs.newsletter || 'all' }}\",\"chain\":\"true\"}}"
          echo "→ Triggered Business Brief"
