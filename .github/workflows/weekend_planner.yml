name: Generate Weekend Planner

on:
  schedule:
    - cron: '0 13 * * 3'  # Every Wednesday at 8am EST (1pm UTC) — 8 days before Thursday issue
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests anthropic
      - name: Generate Weekend Planner
        env:
          CLAUDE_API_KEY:               ${{ secrets.CLAUDE_API_KEY }}
          BRAVE_NEWS_API_KEY:           ${{ secrets.BRAVE_NEWS_API_KEY }}
          NOTION_API_KEY:               ${{ secrets.NOTION_API_KEY }}
          NOTION_WEEKEND_PLANNER_DB_ID: ${{ secrets.NOTION_WEEKEND_PLANNER_DB_ID }}
        run: python "Weekend Planner/Code/Weekend_Planner.py"

      - name: Trigger newsletter page rebuild
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/peachyinsurance/newsletters/actions/workflows/assemble_newsletter.yml/dispatches \
            -d '{"ref":"main","inputs":{"section":"weekend_planner"}}'
          echo "✓ Newsletter page rebuild triggered (weekend_planner section)"
