name: TEST Tribe Scrape (cloud vs Mac Mini)

# DISPOSABLE one-off. Runs the same read-only Tribe fetch diagnostic on BOTH a
# GitHub cloud runner AND the self-hosted Mac Mini, so you can compare side by
# side whether curl_cffi clears Cloudflare's 202 on each. No Notion writes.
# Delete this file + Weekend Events/Code/utilities/test_tribe_fetch.py when done.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  cloud:
    name: Cloud (ubuntu-latest / datacenter IP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        if: runner.environment == 'github-hosted'   # macOS self-hosted: use the Mac's own Python
        with:
          python-version: '3.11'
      - run: pip install requests curl_cffi pgeocode
      - name: Tribe fetch diagnostic
        run: python "Weekend Events/Code/utilities/test_tribe_fetch.py"

  mac_mini:
    name: Mac Mini (self-hosted / residential IP)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        if: runner.environment == 'github-hosted'   # macOS self-hosted: use the Mac's own Python
        with:
          python-version: '3.11'
      - run: pip install requests curl_cffi pgeocode
      - name: Tribe fetch diagnostic
        run: python "Weekend Events/Code/utilities/test_tribe_fetch.py"
