<!DOCTYPE html>
<html>
<head><title>Canva Auth</title></head>
<body>
<h1>Authorization Code</h1>
<p>Copy this code and paste it into your terminal:</p>
<pre id="code" style="font-size: 24px; background: #f0f0f0; padding: 20px; word-break: break-all;"></pre>
<script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    if (code) {
        document.getElementById('code').textContent = code;
    } else {
        document.getElementById('code').textContent = 'Error: ' + (error || 'No code received');
    }
</script>
</body>
</html>
